<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WPanel - Yükleniyor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 500px;
      height: 300px;
      background: linear-gradient(135deg, #0F1419 0%, #1A1F2E 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
      overflow: hidden;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    
    p {
      font-size: 14px;
      color: #A0AEC0;
      margin-bottom: 30px;
    }
    
    .loader {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #25D366, #00A884);
      border-radius: 2px;
      animation: loading 3s ease-in-out infinite;
    }
    
    @keyframes loading {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }
    
    .version {
      position: absolute;
      bottom: 20px;
      font-size: 12px;
      color: #64748B;
    }
  </style>
</head>
<body>
  <div class="logo">📱</div>
  <h1>WPanel</h1>
  <p>WhatsApp Müşteri İletişim Paneli</p>
  <div class="loader">
    <div class="loader-bar"></div>
  </div>
  <div class="version">v1.0.0</div>
</body>
</html>
